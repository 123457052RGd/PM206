<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Cafetería — Módulo de Cocina</title>
  <script src="script.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  
  <!-- NAVEGACION -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAVEGACION -->
  <nav class="nav">
    <div class="nav-brand">
      <i class="ti ti-coffee"></i>
      La Cafetería — Cocina
    </div>
    <button class="nav-btn active" id="tab-pedidos" onclick="mostrarVista('pedidos')">
      <i class="ti ti-clipboard-list"></i> Pedidos
    </button>
    <button class="nav-btn" id="tab-productos" onclick="mostrarVista('productos')">
      <i class="ti ti-package"></i> Productos
    </button>
    <button class="nav-btn" id="tab-nuevo-pedido" onclick="mostrarVista('nuevo-pedido')">
      <i class="ti ti-plus"></i> Nuevo pedido
    </button>
  </nav>

  <!-- VISTA: PEDIDOS -->
  <section class="view active" id="view-pedidos">
    <h2 class="page-title">
      <i class="ti ti-clipboard-list"></i> Gestión de pedidos
    </h2>

    <div id="stats-grid" class="stats-grid"></div>

    <div class="filters">
      <button class="filter-btn active" onclick="filtrarPedidos('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrarPedidos('pendiente', this)">Pendientes</button>
      <button class="filter-btn" onclick="filtrarPedidos('en-preparacion', this)">En preparación</button>
      <button class="filter-btn" onclick="filtrarPedidos('listo', this)">Listos</button>
      <button class="filter-btn" onclick="filtrarPedidos('cancelado', this)">Cancelados</button>
    </div>

    <div id="lista-pedidos"></div>
  </section>

  <!-- VISTA: PRODUCTOS CRUD -->
  <section class="view" id="view-productos">
    <h2 class="page-title">
      <i class="ti ti-package"></i> Gestión de productos
    </h2>

    <div class="toolbar">
      <div class="search-box">
        <i class="ti ti-search"></i>
        <input type="text" id="buscar-prod" placeholder="Buscar producto..." oninput="renderizarProductos()" />
      </div>
      <div class="toolbar-derecha">
        <select id="filtro-cat" onchange="renderizarProductos()" style="width:auto;font-size:12px;padding:6px 10px;">
          <option value="">Todas las categorías</option>
          <option value="Bebidas">Bebidas</option>
          <option value="Alimentos">Alimentos</option>
          <option value="Postres">Postres</option>
          <option value="Snacks">Snacks</option>
        </select>
        <button class="btn btn-accent" onclick="abrirModal(null)">
          <i class="ti ti-plus"></i> Agregar producto
        </button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="prod-tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- VISTA: NUEVO PEDIDO -->
  <section class="view" id="view-nuevo-pedido">
    <h2 class="page-title">
      <i class="ti ti-plus"></i> Crear pedido
    </h2>

    <div class="nuevo-pedido-form">
      <div class="form-row" style="margin-bottom:1.25rem;">
        <div class="form-group" style="margin:0;">
          <label for="pedido-mesa">Mesa / Nombre del cliente</label>
          <input type="text" id="pedido-mesa" placeholder="Ej: Mesa 3 o María López" />
        </div>
        <div class="form-group" style="margin:0;">
          <label for="pedido-notas">Observaciones</label>
          <input type="text" id="pedido-notas" placeholder="Sin azúcar, extra shot..." />
        </div>
      </div>

      <div class="section-label">Seleccionar productos disponibles</div>
      <div class="item-picker" id="item-picker"></div>

      <div class="seleccion-actual" id="seleccion-actual">
        <span class="placeholder-txt">Ningún producto seleccionado</span>
      </div>

      <div class="form-footer">
        <button class="btn" onclick="limpiarNuevoPedido()">
          <i class="ti ti-x"></i> Limpiar
        </button>
        <button class="btn btn-accent" onclick="crearPedido()">
          <i class="ti ti-check"></i> Crear pedido
        </button>
      </div>
    </div>
  </section>

  <!-- MODAL: AGREGAR / EDITAR PRODUCTO -->
  <div class="modal-overlay" id="modal-producto">
    <div class="modal">
      <div class="modal-title">
        <span id="modal-titulo">Agregar producto</span>
        <button class="btn btn-sm" onclick="cerrarModal()" style="border:none;padding:4px;" title="Cerrar">
          <i class="ti ti-x"></i>
        </button>
      </div>

      <input type="hidden" id="edit-id" />

      <div class="form-row">
        <div class="form-group">
          <label for="p-nombre">Nombre *</label>
          <input type="text" id="p-nombre" placeholder="Ej: Café Americano" />
        </div>
        <div class="form-group">
          <label for="p-cat">Categoría *</label>
          <select id="p-cat">
            <option value="Bebidas">Bebidas</option>
            <option value="Alimentos">Alimentos</option>
            <option value="Postres">Postres</option>
            <option value="Snacks">Snacks</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="p-precio">Precio ($) *</label>
          <input type="number" id="p-precio" placeholder="0.00" min="0" step="0.5" />
        </div>
        <div class="form-group">
          <label for="p-stock">Stock *</label>
          <input type="number" id="p-stock" placeholder="0" min="0" />
        </div>
      </div>

      <div class="form-group">
        <label for="p-desc">Descripción</label>
        <textarea id="p-desc" rows="2" placeholder="Breve descripción del producto..."></textarea>
      </div>

      <div class="form-group">
        <label for="p-estado">Estado</label>
        <select id="p-estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="btn" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-accent" onclick="guardarProducto()">
          <i class="ti ti-device-floppy"></i> Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL: CONFIRMAR ELIMINACION -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <h3>Eliminar producto</h3>
      <p>Esta acción no se puede deshacer. ¿Estás seguro?</p>
      <div class="confirm-actions">
        <button class="btn" onclick="cerrarConfirmacion()">Cancelar</button>
        <button class="btn btn-danger" onclick="confirmarEliminar()">
          <i class="ti ti-trash"></i> Sí, eliminar
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
